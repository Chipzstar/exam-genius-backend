name: CI

on:
	push:
		branches:
			- master
	pull_request:

permissions:
	actions: read
	contents: read

env:
	CI: true
	NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
	main:
		runs-on: ubuntu-latest
		steps:
			- uses: actions/checkout@v6
				with:
					filter: tree:0
					fetch-depth: 0

			# Run as early as possible, before dependencies are installed
			# https://nx.dev/ci/reference/nx-cloud-cli#npx-nxcloud-startcirun
			- run: npx nx start-ci-run

			- uses: pnpm/action-setup@v4
				with:
					version: 10.8.0

			- uses: actions/setup-node@v6
				with:
					node-version: 22
					cache: pnpm

			- run: pnpm install --frozen-lockfile

			- uses: nrwl/nx-set-shas@v4
				with:
					main-branch-name: master

			- run: pnpm prisma:sync

			- run: npx nx affected -t lint test build

			# Self-healing CI: propose fixes when tasks fail (no-op when green)
			# https://nx.dev/docs/features/ci-features/self-healing-ci
			- run: npx nx fix-ci
				if: always()
