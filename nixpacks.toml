# Nixpacks configuration for Railway deployment

[phases.setup]
# Use Node.js 23.x to ensure version >= 22.12.0 (required by Prisma 7)
nixPkgs = ["nodejs_23"]

[phases.install]
# Use pnpm for package installation
cmds = [
  "corepack enable",
  "corepack prepare pnpm@10.8.0 --activate",
  "pnpm install --frozen-lockfile"
]

[phases.build]
# Run the build command
cmds = ["pnpm run nx:build:backend:prod"]

[start]
# Start command for production
cmd = "pnpm run nx:serve:backend:prod"

